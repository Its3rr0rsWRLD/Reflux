name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.0) — must already exist in the repo'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: installer/pnpm-lock.yaml

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VER="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"

      - name: Stamp version
        shell: bash
        env:
          VER: ${{ steps.version.outputs.ver }}
        run: |
          node -e "
            const f = 'installer/package.json';
            const p = JSON.parse(require('fs').readFileSync(f, 'utf8'));
            p.version = process.env.VER;
            require('fs').writeFileSync(f, JSON.stringify(p, null, 2) + '\n');
          "
          node -e "
            const f = 'src/preload.js';
            let s = require('fs').readFileSync(f, 'utf8');
            s = s.replace(/version:\s*'[^']*'/, \"version: '\" + process.env.VER + \"'\");
            require('fs').writeFileSync(f, s);
          "

      - name: Build src zip
        shell: pwsh
        run: |
          Compress-Archive -Path "src\*" -DestinationPath "reflux-src.zip" -Force

      - name: Install dependencies
        working-directory: installer
        run: pnpm install --no-frozen-lockfile

      - name: Build installers
        working-directory: installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node build.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            installer/dist/*.exe
            reflux-src.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: dist/

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Reflux ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          generate_release_notes: true
          files: dist/**
          body: |
            ## Installation

            ### GUI installer (recommended)
            Download **`reflux-*-win-x64-setup.exe`** and run it. No installation required — it's a portable single-file app.

            On first install, the installer downloads the Reflux runtime from this release and writes it to `%APPDATA%\Reflux\src\` so Fluxer can always find it.

            Use the **Update** button inside the installer to fetch the latest runtime without reinstalling.

            ### CLI (advanced)
            Download **`reflux-*-win-x64-cli.exe`** and run it from a terminal:
            ```
            reflux-vX.X.X-win-x64-cli.exe          # install
            ```

            ### Runtime source
            **`reflux-src.zip`** contains the raw Reflux runtime files. The GUI installer downloads this automatically — you only need it if you're doing manual or scripted installs.
